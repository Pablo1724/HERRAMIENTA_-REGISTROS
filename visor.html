<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Académico | UPDS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        #error-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; z-index: 10000; padding: 50px; text-align: center; }

        /* --- ESTILOS PARA EL MENÚ DE SELECCIÓN ASISTIDA --- */
        .menu-seleccion-oferta {
            animation: fadeInScale 0.2s ease-out;
            scrollbar-width: thin;
            scrollbar-color: #ffcc00 #001a35;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .opt-item-oferta {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .opt-item-oferta:hover:not(.opt-disabled) {
            background: #072a4d !important;
            border-left: 3px solid #ffcc00;
            padding-left: 12px !important;
        }

        .opt-disabled {
            background: #1a1a1a !important;
            cursor: not-allowed !important;
        }

        /* Estilos para el indicador de materia programando */
        #materia-activa-display {
            text-align: center; 
            color: #ffcc00; 
            font-weight: 800; 
            margin-bottom: 15px; 
            min-height: 1.6em; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        /* Estilos para el estado de gestión en el título */
        .gestion-badge {
            font-size: 0.5em;
            color: #ffcc00;
            display: block;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* Ocultar elementos innecesarios al imprimir */
        @media print {
            .navbar, .stats-bar, .btn-mass-approve, #materia-activa-display {
                display: none !important;
            }
            body { background: white !important; }
        }
    </style>
</head>
<body>
    <div id="error-overlay">
        <h1>⚠️ ERROR CRÍTICO</h1>
        <p id="error-msg">Cargando...</p>
        <button onclick="location.reload()" style="padding: 10px 20px; font-weight: bold; cursor: pointer;">RECARGAR PÁGINA</button>
    </div>

    <div class="visor-container">
        <nav class="navbar">
            <div style="display: flex; align-items: center;">
                <a href="index.html" class="btn-back"><span class="icon">❮</span></a>
                <img src="img/upds_logo2.png" alt="Logo" class="dash-logo" style="height: 45px; width: auto; margin-right: 15px;">
                <div class="brand">
                    <h1>UPDS | PROYECCIÓN <span id="carrera-actual-titulo" style="color: #ffcc00; margin-left: 10px; border-left: 2px solid #ffffff33; padding-left: 15px;"></span></h1>
                </div>
            </div>
            <div id="navbar-center-stats"></div>
            <div class="student-info">
                <input type="text" id="student-name" placeholder="👤 Nombre Estudiante">
                <input type="text" id="student-phone" placeholder="📱 WhatsApp">
            </div>
        </nav>
        
        <div class="stats-bar">
            <div><strong>Estado:</strong> <span id="msg-clash" style="color:orange">Iniciando...</span></div>
            
            <div class="modality-container">
                <span class="modality-label">MODALIDAD:</span>
                <div class="modality-group">
                    <input type="radio" id="mod-semanal" name="modality" value="SEMANAL" checked onchange="cambiarModalidad('SEMANAL')">
                    <label for="mod-semanal">SEMANAL</label>
                    <input type="radio" id="mod-semipresencial" name="modality" value="SEMIPRESENCIAL" onchange="cambiarModalidad('SEMIPRESENCIAL')">
                    <label for="mod-semipresencial">SEMIPRESENCIAL</label>
                </div>
            </div>

            <div>
                <button class="btn" style="background:var(--upds-blue)" onclick="window.print()">🖨️ Imprimir</button>
                <button class="btn-whatsapp-pro" onclick="enviarWhatsApp()">💬 WhatsApp</button>
                <button class="btn" style="background:var(--danger)" onclick="reiniciarMalla()">🔄 Limpiar</button>
            </div>
        </div>
            
        <div id="reporte-area">
            <div id="materia-activa-display"></div>
            
            <div class="malla-wrapper" id="malla-body"></div>
        </div>
    </div>

    <script>
        function scriptError(src) {
            document.getElementById('error-overlay').style.display = 'block';
            document.getElementById('error-msg').innerText = "No se pudo cargar el archivo: " + src + "\nVerifique que el archivo exista en la carpeta 'js'.";
        }
    </script>
    <script src="js/materias.js" onerror="scriptError('js/materias.js')"></script>
    <script src="js/motor.js" onerror="scriptError('js/motor.js')"></script>
</body>
</html>
